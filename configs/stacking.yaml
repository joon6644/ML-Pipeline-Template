# configs/stacking.yaml
# Stacking Ensemble 기초 설정 설문지 (강력한 2층 모델링 방안)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 1. 프로젝트 및 핵심 정보
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
project:
  # Q1. 프로젝트 이름 (결과물 저장 폴더명 등으로 활용 가능)
  name: "Stacking_Ensemble_Experiment"
  
  # Q2. 랜덤 시드 (재현성을 위해 고정)
  seed: 42

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 2. 데이터 경로 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
data:
  # Q3. 훈련용/검증용으로 쓸 원본 데이터 경로 (필수)
  train_path: "data/raw/train.csv"
  
  # Q4. (선택) 분리된 평가용 데이터가 있다면 경로 입력 (없으면 null)
  test_path: null

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 3. 타겟(Target) 변수 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
target:
  # Q5. 예측해야 할 정답 컬럼명
  name: "target"
  
  # Q6. 문제 유형
  #      → classification: 분류 (예: 생존 vs 사망)
  #      → regression: 회귀 (예: 집값 예측)
  type: "classification"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 4. 사용할 피처(설명변수) 목록
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
features:
  # Q7. 결측값을 채우거나 스케일링을 할 연속형(수치형) 변수들
  num_cols:
    - "age"
    - "salary"
    - "balance"

  # Q8. 라벨 인코딩 등을 할 범주형(문자/구분) 변수들
  cat_cols:
    - "gender"
    - "job_type"

  # Q9. 모델 학습에 쓰지 않을 컬럼 (ID, 이름 등)
  drop_cols:
    - "id"
    - "name"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 4.5  전처리 실행 스위치 (On/Off)
#            이미 전처리가 끝난 데이터를 불러올 때는 false로 꺼두세요
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # ── [A] 사용자 정의 전처리 (custom_preprocessor.py) ──
  # Q9-1. 사용자가 직접 짠 전처리 코드 실행 여부
  #       → true  : custom_preprocessor.py의 코드를 실행합니다 (기본값)
  #       → false : 사용자 전처리를 건너뜁니다 (이미 가공된 데이터를 쓸 때)
  enable_custom_preprocessing: true

  # ── [B] 시스템 자동 전처리 (결측치 · 스케일링 · 인코딩) ──
  # Q9-2. YAML 설정 기반 자동 전처리 실행 여부
  #       → true  : 아래 STEP 5~8의 설정에 따라 자동 전처리합니다 (기본값)
  #       → false : 시스템 전처리를 통째로 건너뜁니다
  enable_system_preprocessing: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 5. 결측치(빈칸) 처리 방법
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
preprocessing:
  # Q10. 연속형 변수 빈칸 채우기
  #      → mean: 평균값
  #      → median: 중간값
  #      → most_frequent: 최빈값
  #      → knn: K-최근접 이웃 알고리즘 사용
  numerical_imputer: "median"

  # Q11. 범주형 변수 빈칸 채우기
  #      → most_frequent: 최빈값
  #      → missing: 'Missing'이라는 새로운 칸으로 만들기
  categorical_imputer: "most_frequent"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 6. 데이터 불균형 보정 방법
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
imbalance:
  # Q12. 불균형 보정 기법 (분류 문제에서 한쪽 정답이 너무 적을 때)
  #      ※ 스태킹 특성상, 베이스 모델에 불균형 처리가 잘 되어 있다면 "none" 권장
  method: "none"
  # Q13. 소수 클래스 복제/언더샘플링 비율 (0 초과 1 이하. 기본 1.0)
  sampling_strategy: 1.0

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 7. 데이터 스케일링(크기 맞춤)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
scaling:
  # Q15. 연속형 변수 스케일링 방법
  #      → minmax: 0 ~ 1 사이로 압축 (비전/특정 딥러닝에서 선호)
  #      → standard: 평균 0, 표준편차 1 (일반적 권장)
  #      → robust: 중앙값과 사분위수 사용하여 이상치에 덜 민감
  #      ※ 스태킹 모델에 포함될 로지스틱이나 SVM을 위해 standard 이상 권장
  method: "standard"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 8. 범주형 데이터 변환 (인코딩)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
encoding:
  # Q16. 문자형/범주형 데이터를 숫자로 바꾸는 방법
  #      → label     : 0, 1, 2... 순차 숫자로 부여
  #      → onehot    : 컬럼을 쪼개서 0과 1로 (컬럼 수 폭증 주의)
  #      → target    : 타겟 값의 평균으로 인코딩 (데이터 누수 주의 - kfold 권장)
  #      ※ 스태킹 앙상블은 내부 트리와 선형을 혼합하므로 target 인코딩이 안전하고 효율적입니다.
  method: "target"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 9. 학습 설정 (CV 및 검증)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
training:
  # Q24. 교차 검증(K-Fold) 쪼갤 폴드 수
  n_splits: 5
  
  # Q25. 데이터 분할 전략
  split_strategy: "stratified"
  
  # Q26. group 전략 시 그룹으로 사용할 컬럼
  group_col: null
  
  # Q27. K-Fold 셔플 여부
  shuffle: true
  
  # Q28. 얼리스토핑 patience
  early_stopping_rounds: 0


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 10. Stacking Ensemble 전용 구조 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
model:
  # Q29. 이 모델의 정체 (절대 수정 금지)
  algorithm: "stacking"

  fixed_params:
    # Q30. 1층(Base)에 등장할 프런트 모델들 리스트
    #      (지원 목록: catboost, lightgbm, xgboost, randomforest, svm, knn 등)
    #      ※ 주의: 너무 똑같은 특성의 두 모델을 넣기보다 각자 장단점이 다른 모델이 좋습니다.
    #      ※ 각 베이스 모델별로 하이퍼파라미터를 세밀하게 지정하려면 list 대신 dict 형태(선택 사항)를 지원하도록 템플릿 확장이 가능합니다.
    #      현재 구조는 '문자열 리스트'를 받아 기본 파라미터로 베이스 모델을 훈련하도록 설계되어 있습니다.
    base_models:
      - "catboost"
      - "lightgbm"
      - "randomforest"
      
    # Q31. 2층(Meta)에 등장할 최종 보스 결재 모델
    #      분류일 경우 로지스틱 회귀(logistic)가 제일 깔끔하게 확률을 취합합니다.
    #      비선형적인 메타 결합표면이 필요하면 xgboost나 lightgbm을 쓸 수도 있습니다.
    meta_model: "logistic"

    # Q32. 1층 모델들이 2층 학습용 데이터를 만들 때 사용할 폴드 수
    cv: 5

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 11. Stacking Optuna 하이퍼파라미터 튜닝
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
optuna:
  # Q33. 자동 튜닝(Optuna) 활성화 여부
  #      스태킹은 기본적으로 1층 모델들의 디폴트 파라미터를 그대로 사용하게 설계했습니다.
  #      따라서 false를 권장합니다.
  enable: false
  
  # Q34. 튜닝 시도 횟수
  n_trials: 10
  
  # Q35. 튜닝 시간 제한 (초)
  timeout: 3600
  
  # Q36. 튜닝 탐색 범위 (빈 값)
  params: {}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 12. 평가 및 저장 지표
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
evaluation:
  # Q37. 모델 최종 평가 시 주력으로 볼 지표
  #      → f1, accuracy, roc_auc, pr_auc 등 (분류)
  primary_metric: "f1"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 13. 시각화 및 부가 기능
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
visualization:
  # Q38. 혼동 행렬 그리기 (분류 전용)
  confusion_matrix: true
  
  # Q39. SHAP 요약 시각화
  #      ※ 스태킹 모델은 SHAP을 그리기 어렵습니다 (구조 복잡). false 권장.
  shap_summary: false
  
  # Q40. ROC 커브 시각화
  roc_curve: true
