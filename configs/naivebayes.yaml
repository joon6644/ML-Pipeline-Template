# ╔══════════════════════════════════════════════════════════════╗
# ║  📋  Naive Bayes 파이프라인 설정 가이드                       ║
# ║  위에서부터 순서대로 항목을 확인하며 값을 채워주세요            ║
# ║  ※ 분류 전용 — 매우 가볍고 빠른 확률 모델                     ║
# ╚══════════════════════════════════════════════════════════════╝

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 1.  프로젝트 기본 정보
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
project:
  # Q1. 프로젝트 이름 (결과 파일·로그에 표시됩니다)
  name: "my_naivebayes_project"
  # Q2. 랜덤 시드 (재현성을 위해 고정)
  seed: 42
  # Q3. 어떤 문제를 풀고 있나요?
  #     ※ Naive Bayes는 분류 전용입니다
  #     → classification : 분류 (이진 · 다중)
  task_type: "classification"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 2.  데이터 경로
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
paths:
  # Q4. 훈련 데이터 파일 경로
  raw_data: "data/raw/train.csv"
  # Q5. 전처리 후 저장 경로
  processed_data: "data/processed/train_nb.parquet"
  # Q6. K-Fold 분할 저장 경로
  interim_train: "data/interim/train.parquet"
  interim_holdout: "data/interim/holdout.parquet"
  # Q7. 테스트 데이터 경로 (없으면 비워두세요)
  test_data: "data/raw/test.csv"
  # Q8. 결과물 저장 폴더들
  model_dir: "models"
  result_dir: "results"
  figure_dir: "results/figures"
  submission_dir: "results/submissions"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 3.  타겟 · 컬럼 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
data:
  # Q9. 예측할 타겟 변수의 컬럼명
  target_col: "target"
  # Q10. ID 컬럼명 (없으면 null)
  id_col: "id"
  # Q11. CSV 구분자
  separator: ","
  # Q12. CSV 파일 인코딩
  encoding: "utf-8"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 4.  피처(변수) 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
features:
  # Q13. 학습에서 제외할 컬럼
  drop_cols:
    - "index"
  # Q14. 범주형 변수 목록
  cat_cols:
    - "gender"
    - "house_type"
    - "income_type"
    - "job_type"
  # Q15. 수치형 변수 목록
  num_cols:
    - "age"
    - "income_total"
    - "days_employed"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 4.5  전처리 실행 스위치 (On/Off)
#            이미 전처리가 끝난 데이터를 불러올 때는 false로 꺼두세요
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # ── [A] 사용자 정의 전처리 (custom_preprocessor.py) ──
  # Q15-1. 사용자가 직접 짠 전처리 코드 실행 여부
  #        → true  : custom_preprocessor.py의 코드를 실행합니다 (기본값)
  #        → false : 사용자 전처리를 건너뜁니다 (이미 가공된 데이터를 쓸 때)
  enable_custom_preprocessing: true

  # ── [B] 시스템 자동 전처리 (결측치 · 스케일링 · 인코딩) ──
  # Q15-2. YAML 설정 기반 자동 전처리 실행 여부
  #        → true  : 아래 STEP 5~8의 설정에 따라 자동 전처리합니다 (기본값)
  #        → false : 시스템 전처리를 통째로 건너뜁니다
  enable_system_preprocessing: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 5.  결측치 처리
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  missing:
    # Q16. 수치형 결측치 처리
    #      → median | mean | zero | knn | iterative | drop
    numeric_strategy: "median"
    # Q17. 범주형 결측치 처리
    #      → mode | constant | drop
    categorical_strategy: "mode"
    # Q18. constant 선택 시 채울 값
    fill_value: "MISSING"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 6.  클래스 불균형 처리
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  imbalance:
    # Q19. 불균형 보정 방법
    #      ── 오버샘플링 ──
    #      → none            : 사용 안 함
    #      → smote           : SMOTE — 합성 소수 오버샘플링 (가장 대표적)
    #      → adasyn | borderline_smote | random_over
    #      ── 언더샘플링 ──
    #      → random_under | tomek | enn
    #      ── 복합 ──
    #      → smote_tomek | smote_enn
    method: "none"

    # Q20. 리샘플링 비율
    #      → "auto" : 1:1 | 0.5 : 50% | 0.3 : 30% | "minority" | "not majority"
    sampling_strategy: "auto"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 7.  스케일링 (수치형 정규화)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  scaling:
    # Q20. 스케일링 방법
    #      ※ NB는 스케일링 필수는 아니지만, 적용 시 성능 향상 가능
    #      → none | standard | robust | minmax
    method: "none"
    # Q21. 스케일링 대상 컬럼
    #      → auto : 수치형 전체 자동
    #      → 직접 지정 예시:
    #        cols:
    #          - "age"
    #          - "income_total"
    #      ※ 존재하지 않는 컬럼명 입력 시 에러가 발생합니다
    cols: "auto"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 8.  범주형 인코딩
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  encoding:
    # Q22. 인코딩 방법
    #      → ordinal | label | target | none
    method: "ordinal"
    # Q23. 인코딩 대상
    #      → auto : cat_cols 전체
    #      → 직접 지정 예시:
    #        cols:
    #          - "gender"
    #          - "house_type"
    #      ※ 존재하지 않는 컬럼명 입력 시 에러가 발생합니다
    cols: "auto"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 9.  모델 학습 기본 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
model:
  # ※ 이 파일은 Naive Bayes 전용입니다 (변경 불필요)
  algorithm: "naivebayes"
  # Q24. K-Fold 교차검증 수
  n_splits: 5
  # Q25. 데이터 분할 전략
  #      → stratified | kfold | group | timeseries
  split_strategy: "stratified"
  # Q26. group 전략 시 그룹 컬럼 (그 외엔 null)
  group_col: null
  # Q27. K-Fold 셔플 여부
  shuffle: true
  # Q28. 얼리스토핑 — Naive Bayes는 미지원 (0 고정)
  early_stopping_rounds: 0

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 10. Naive Bayes 고정 하이퍼파라미터
#           ※ GaussianNB는 고정 파라미터가 거의 없습니다
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  fixed_params: {}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 11. Optuna 자동 하이퍼파라미터 탐색
#           ※ 파라미터가 1개뿐이라 적은 trial로 충분합니다
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  optuna:
    # Q29. Optuna 사용 여부
    enabled: true
    # Q30. 탐색 횟수 (NB는 파라미터 1개라 10이면 충분)
    n_trials: 10
    # Q31. 시간 제한 (초, null이면 무제한)
    timeout: null
    # Q32. 탐색 범위
    params:
      var_smoothing: [1.0e-12, 1.0e-3]  # 분산 스무딩 계수 (안정성 보정)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 12. 평가 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
evaluation:
  # Q33. Optuna 목표 지표
  #      [분류]  logloss | auc | f1_macro | f1_micro | accuracy
  optuna_target_metric: "f1_macro"
  # Q34. 목표 방향
  #      → minimize | maximize
  optuna_direction: "maximize"
  # Q35. 최종 리포트 지표 목록
  report_metrics:
    - "accuracy"
    - "precision_macro"
    - "recall_macro"
    - "f1_macro"
    - "f1_micro"
    - "roc_auc"
    - "pr_auc"
    - "logloss"
    # - "f1_weighted"
    # - "cohen_kappa"
    # - "matthews_corrcoef"
  # Q36. 이진분류 임계값 튜닝 (다중분류는 false)
  threshold_tuning:
    enabled: true
    metric: "f1_macro"
    search_range: [0.1, 0.9]
    search_step: 0.01

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  STEP 13. 시각화 설정 (true = 생성 / false = 건너뜀)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
visualization:
  # --- 기본 차트 ---
  confusion_matrix: true           # 혼동 행렬
  feature_importance: false        # ※ NB는 중요도 속성 없음
  roc_curve: true                  # ROC 커브
  pr_curve: true                   # PR 커브
  calibration_curve: true          # 확률 교정 곡선
  prediction_scatter: true         # 예측 확률 산점도
  lift_gain_curve: true            # Lift / Gain 커브
  # --- SHAP 설명력 차트 (TreeExplainer 미지원 ※) ---
  shap_summary: false
  shap_waterfall: false
  shap_dependence: false
  partial_dependence: true         # PDP — sklearn 모든 모델 호환
  # --- 차트 세부 옵션 ---
  shap_max_display: 20
  shap_dependence_features: 5
  pdp_features: 5
  dpi: 150
